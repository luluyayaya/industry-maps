<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>跨境物流 RPA+AI 自动化机会地图</title>
<style>
:root{
  --bg:#f0f4f8;--surf:#fff;--surf2:#f7f9fc;--bd:#dce3ea;--bd2:#edf0f4;
  --t1:#0d1b2a;--t2:#364f6b;--t3:#8a9aac;
  --acc:#1B2A4A;--acc2:#1B4F8A;--acc-l:#e5edf8;
  --rpa-bg:#dbeafe;--rpa-fg:#1e3a8a;--rpa-bd:#93c5fd;
  --ai-bg:#ede9fe;--ai-fg:#5b21b6;--ai-bd:#c4b5fd;
  --ri-bg:#d1fae5;--ri-fg:#065f46;--ri-bd:#6ee7b7;
  --nav:244px;--hdr:60px;--flt:46px;
  --r:8px;--r2:5px;
  --s1:0 1px 3px rgba(0,0,0,.06);--s2:0 4px 14px rgba(0,0,0,.10);--s3:0 20px 52px rgba(0,0,0,.14);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:14px}
body{font-family:"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
     background:var(--bg);color:var(--t1);height:100vh;overflow:hidden;display:flex;flex-direction:column}
#hdr{height:var(--hdr);flex-shrink:0;z-index:100;
     background:linear-gradient(135deg,#071524 0%,#1B2A4A 50%,#1a4a82 100%);
     box-shadow:0 2px 12px rgba(0,0,0,.3);display:flex;align-items:center;padding:0 20px;gap:14px}
.hbox{width:36px;height:36px;background:rgba(255,255,255,.12);border-radius:8px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
.htx b{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px}
.htx small{font-size:10.5px;color:rgba(255,255,255,.55)}
#hmeta{font-size:11px;color:rgba(255,255,255,.5);margin-left:6px}
.tag{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:12px;border:1px solid}
.trpa{background:var(--rpa-bg);color:var(--rpa-fg);border-color:var(--rpa-bd)}
.tai{background:var(--ai-bg);color:var(--ai-fg);border-color:var(--ai-bd)}
.tri{background:var(--ri-bg);color:var(--ri-fg);border-color:var(--ri-bd)}
#flt{height:var(--flt);flex-shrink:0;background:var(--surf);border-bottom:1px solid var(--bd);
     display:flex;align-items:center;padding:0 18px;gap:8px}
.fl{font-size:11px;color:var(--t3)}
.fb{padding:5px 13px;border-radius:20px;border:1px solid var(--bd);background:transparent;
    font-size:12px;font-weight:500;cursor:pointer;color:var(--t2);transition:all .12s;font-family:inherit}
.fb:hover{border-color:var(--acc2);color:var(--acc2)}
.fall{background:var(--acc);color:#fff;border-color:var(--acc)}
.frpa{background:var(--rpa-fg);color:#fff;border-color:var(--rpa-fg)}
.fai{background:var(--ai-fg);color:#fff;border-color:var(--ai-fg)}
.fri{background:var(--ri-fg);color:#fff;border-color:var(--ri-fg)}
.fdiv{width:1px;height:18px;background:var(--bd);flex-shrink:0}
.sw{margin-left:auto;position:relative;display:flex;align-items:center}
.sic{position:absolute;left:9px;color:var(--t3);font-size:13px;pointer-events:none;top:50%;transform:translateY(-50%)}
#sinp{width:240px;padding:6px 28px 6px 30px;border:1px solid var(--bd);border-radius:var(--r);
      font-size:12.5px;font-family:inherit;color:var(--t1);background:var(--bg);outline:none;transition:all .12s}
#sinp:focus{border-color:var(--acc2);background:var(--surf);box-shadow:0 0 0 3px rgba(27,79,138,.10)}
#sclr{position:absolute;right:7px;cursor:pointer;color:var(--t3);font-size:16px;display:none;
      top:50%;transform:translateY(-50%)}
#sclr:hover{color:var(--t1)}
#scnt{font-size:11.5px;color:var(--t3);min-width:54px;white-space:nowrap;margin-left:8px}
#bdy{display:flex;flex:1;overflow:hidden}
#nav{width:var(--nav);background:var(--surf);border-right:1px solid var(--bd);overflow-y:auto;flex-shrink:0;padding:10px 8px}
#nav::-webkit-scrollbar{width:3px}
#nav::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.nlbl{font-size:10px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.8px;padding:4px 10px 8px}
.ni{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--r2);cursor:pointer;transition:background .11s;margin-bottom:1px}
.ni:hover{background:var(--bg)}
.ni.act{background:var(--acc-l)}
.ni.act .nn{color:var(--acc2);font-weight:600}
.niic{flex-shrink:0;font-size:15px;line-height:1;opacity:.7}
.ni.act .niic{opacity:1}
.ntx{flex:1;min-width:0}
.nn{font-size:12.5px;color:var(--t1);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nc{font-size:11px;color:var(--t3);background:var(--bg);border:1px solid var(--bd);border-radius:10px;padding:0 6px;line-height:18px;flex-shrink:0}
.ni.act .nc{background:var(--acc-l);border-color:var(--rpa-bd);color:var(--acc2)}
#cnt{flex:1;overflow-y:auto;padding:20px 22px}
#cnt::-webkit-scrollbar{width:5px}
#cnt::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.ds{display:none}.ds.vis{display:block}
.dh{display:flex;align-items:center;gap:11px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--acc2)}
.dic{flex-shrink:0;width:42px;height:42px;display:flex;align-items:center;justify-content:center;
     background:linear-gradient(135deg,#071524,#1B4F8A);border-radius:var(--r);font-size:21px}
.dtx{flex:1}.dt{font-size:17px;font-weight:700;color:var(--t1)}
.dd{font-size:12px;color:var(--t3);margin-top:2px}
.dsts{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap}
.wb{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);margin-bottom:10px;overflow:hidden;box-shadow:var(--s1);transition:box-shadow .13s}
.wb:hover{box-shadow:var(--s2)}
.wh{display:flex;align-items:center;padding:10px 15px;cursor:pointer;user-select:none;gap:9px;transition:background .1s;border-bottom:1px solid transparent}
.wh:hover{background:var(--surf2)}
.wh.op{background:var(--surf2);border-bottom-color:var(--bd)}
.wa{color:var(--t3);transition:transform .18s;flex-shrink:0;font-size:11px}
.wa.op{transform:rotate(90deg)}
.wn{font-size:13px;font-weight:600;color:var(--t1);flex:1}
.wi2{font-size:11.5px;color:var(--t3)}
.wbod{display:none}.wbod.op{display:block}
.nt{width:100%;border-collapse:collapse}
.nt th{padding:7px 13px;text-align:left;font-size:10px;font-weight:600;color:var(--t3);
       text-transform:uppercase;letter-spacing:.5px;background:#f2f6fb;border-bottom:1px solid var(--bd)}
.nt th:nth-child(1){width:18%}.nt th:nth-child(2){width:10%}.nt th:nth-child(3){width:44%}.nt th:nth-child(4){width:28%}
.nr{border-bottom:1px solid var(--bd2);cursor:pointer;transition:background .09s}
.nr:last-child{border-bottom:none}
.nr:hover{background:#eef5ff}
.nr.act{background:var(--acc-l)}
.nr.hid{display:none}
.nr td{padding:10px 13px;vertical-align:top}
.nm{font-size:12.5px;font-weight:600;color:var(--t1);line-height:1.4}
.tb{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px;border:1px solid;white-space:nowrap}
.trpa2{background:var(--rpa-bg);color:var(--rpa-fg);border-color:var(--rpa-bd)}
.tai2{background:var(--ai-bg);color:var(--ai-fg);border-color:var(--ai-bd)}
.tri2{background:var(--ri-bg);color:var(--ri-fg);border-color:var(--ri-bd)}
.ot{font-size:12px;color:var(--t2);line-height:1.7}
.et{font-size:12px;color:#065f46;line-height:1.65;font-style:italic}
mark.hl{background:#fde68a;color:var(--t1);border-radius:2px;padding:0 1px}
#dp{position:fixed;right:-400px;top:calc(var(--hdr) + var(--flt));width:386px;
    height:calc(100vh - var(--hdr) - var(--flt));background:var(--surf);border-left:1px solid var(--bd);
    box-shadow:var(--s3);overflow:hidden;transition:right .24s cubic-bezier(.4,0,.2,1);z-index:200;display:flex;flex-direction:column}
#dp.op{right:0}
#dphdr{padding:16px 18px 12px;border-bottom:1px solid var(--bd2);flex-shrink:0;position:relative}
#dpcls{position:absolute;top:12px;right:12px;width:26px;height:26px;border-radius:50%;border:1px solid var(--bd);
       background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--t3);transition:all .12s}
#dpcls:hover{background:var(--bd);color:var(--t1)}
#dpbod{flex:1;overflow-y:auto;padding:16px 18px 20px}
#dpbod::-webkit-scrollbar{width:3px}
#dpbod::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
.dpwf{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:5px}
.dpnm{font-size:15px;font-weight:700;color:var(--t1);line-height:1.4;margin-bottom:10px}
.dptype{margin-bottom:14px}
.dpsec{margin-bottom:14px}
.dplbl{font-size:10px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.dplbl::after{content:"";flex:1;height:1px;background:var(--bd)}
.dpbox{font-size:13px;color:var(--t2);line-height:1.8;background:var(--surf2);border-radius:var(--r2);padding:11px 13px;border:1px solid var(--bd2)}
.dpeff{font-size:12px;color:#065f46;padding:9px 11px;background:#f0fdf4;border:1px solid #a7f3d0;border-radius:var(--r2);line-height:1.7}
.ag{display:grid;grid-template-columns:repeat(auto-fill,minmax(258px,1fr));gap:10px;margin-bottom:18px}
.ac{background:var(--surf);border:1px solid var(--bd);border-radius:var(--r);padding:14px 15px;cursor:pointer;transition:all .13s;box-shadow:var(--s1)}
.ac:hover{box-shadow:var(--s2);border-color:var(--acc2);transform:translateY(-1px)}
.achdr{display:flex;align-items:center;gap:9px;margin-bottom:7px}
.acic{font-size:22px;line-height:1}
.acnm{font-size:13px;font-weight:700;color:var(--t1)}
.acd{font-size:11px;color:var(--t3);line-height:1.5;margin-bottom:9px}
.actags{display:flex;gap:5px;flex-wrap:wrap}
.acst{font-size:11px;font-weight:600;padding:2px 8px;border-radius:10px}
.acst-r{background:var(--rpa-bg);color:var(--rpa-fg)}
.acst-a{background:var(--ai-bg);color:var(--ai-fg)}
.acst-i{background:var(--ri-bg);color:var(--ri-fg)}
#empty{display:none;flex-direction:column;align-items:center;justify-content:center;height:260px;color:var(--t3);gap:8px}
#empty.vis{display:flex}
</style>
</head>

var DEPTS=[

function toggleWF(wh){wh.classList.toggle("op");wh.querySelector(".wa").classList.toggle("op");wh.nextSibling.classList.toggle("op");}
var curDept=-1,curFilter=0,curSearch="";
function showD(id){
  curDept=id;
  document.querySelectorAll(".ni").forEach(function(n){n.classList.remove("act");});
  var el=(id===-1)?document.getElementById("nav-all"):document.getElementById("nav-"+id);
  if(el)el.classList.add("act");
  document.querySelectorAll(".ds").forEach(function(d){d.classList.remove("vis");});
  var t=(id===-1)?document.getElementById("d-all"):document.getElementById("d-"+id);
  if(t)t.classList.add("vis");
  closeDP();applyFilter();
}
function setF(f){
  curFilter=f;
  var ids=["ball","brpa","bai","bri"],cls=["fall","frpa","fai","fri"];
  ids.forEach(function(id,i){document.getElementById(id).className="fb"+(i===f?" "+cls[i]:"");});
  applyFilter();
}
function applyFilter(){
  var q=curSearch.toLowerCase();
  var tm={1:"RPA",2:"AI",3:"RPA+AI"};
  var ft=curFilter?tm[curFilter]:"";
  if(q){document.querySelectorAll(".wbod").forEach(function(b){b.classList.add("op");});document.querySelectorAll(".wh").forEach(function(h){h.classList.add("op");});document.querySelectorAll(".wa").forEach(function(a){a.classList.add("op");});}
  var vis=0;
  document.querySelectorAll(".nr").forEach(function(r){
    var ok=(!ft||r.dataset.type===ft)&&(!q||(r.dataset.node+r.dataset.opp+r.dataset.eff).toLowerCase().indexOf(q)>=0);
    r.classList.toggle("hid",!ok);if(ok)vis++;
    if(q&&ok){r.querySelectorAll(".nm,.ot,.et").forEach(function(el){var re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&"),"gi");el.innerHTML=el.textContent.replace(re,function(m){return'<mark class="hl">'+m+'</mark>';});});}
    else{r.querySelectorAll(".nm,.ot,.et").forEach(function(el){el.innerHTML=el.textContent;});}
  });
  document.getElementById("scnt").textContent=(q||ft)?(vis+"\u6761"):"";
  document.getElementById("empty").classList.toggle("vis",vis===0&&curDept!==-1);
}
var sinp=document.getElementById("sinp");
sinp.addEventListener("input",function(){curSearch=sinp.value;document.getElementById("sclr").style.display=curSearch?"flex":"none";applyFilter();});
sinp.addEventListener("keydown",function(e){if(e.key==="Escape")clrS();});
function clrS(){sinp.value="";curSearch="";document.getElementById("sclr").style.display="none";applyFilter();}
function openDP(tr,node,typ,opp,eff,wfName){
  document.querySelectorAll(".nr").forEach(function(r){r.classList.remove("act");});tr.classList.add("act");
  var tc=(typ==="RPA"?"trpa2":typ==="AI"?"tai2":"tri2");
  document.getElementById("dp-wf").textContent=wfName;
  document.getElementById("dp-nm").textContent=node;
  document.getElementById("dp-type").innerHTML='<span class="tb '+tc+'">'+typ+'</span>';
  document.getElementById("dp-opp").textContent=opp;
  document.getElementById("dp-eff").textContent=eff;
  document.getElementById("dp").classList.add("op");
}
function closeDP(){document.getElementById("dp").classList.remove("op");document.querySelectorAll(".nr").forEach(function(r){r.classList.remove("act");});}
document.getElementById("nav-all").classList.add("act");document.getElementById('nc-all').textContent=81;

</script>
